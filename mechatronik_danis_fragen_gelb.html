<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danis Fragen vom letzten Jahr</title>
<style>
:root{--primary-color:#f0c419;--secondary-color:#d4a80f;--background:#fffdf5;--text-color:#333;--accent-color:#f7d75b}
body{font-family:Arial;margin:0;background:var(--background);color:var(--text-color)}header{background:linear-gradient(45deg,var(--primary-color),var(--secondary-color));padding:1.5rem;text-align:center}
main{max-width:980px;margin:auto;padding:1rem}.category{background:#fff;padding:10px;margin:5px;border-radius:6px;cursor:pointer;border:1px solid #ddd;display:flex;align-items:center;gap:8px}.pill{margin-left:auto;background:#fff6d6;color:#8a6d00;border-radius:999px;padding:2px 8px;font-size:12px}
.question-box{background:#fff;padding:1rem;border-radius:6px;margin-top:1rem}.answer{background:#fff6d6;padding:1rem;margin-top:1rem;border-radius:6px;display:none;white-space:pre-line}
button{background:var(--primary-color);color:#222;border:none;padding:10px;border-radius:4px;margin-top:10px;cursor:pointer}a.back-link{display:inline-block;background:var(--primary-color);color:#222;text-decoration:none;padding:10px;border-radius:4px}
.progress{height:10px;background:#ddd;margin-top:10px}.bar{height:100%;background:var(--accent-color);width:0%}
</style>
</head>
<body>
<header><h1>Danis Fragen vom letzten Jahr</h1><p><a class="back-link" href="index.html">Zur Landing Page</a></p></header>
<main><div id="categories"></div><button onclick="startQuiz()">Start</button>
<div id="quiz" style="display:none;"><div class="question-box"><h3 id="question"></h3><button onclick="showAnswer()">Antwort anzeigen</button><div class="answer" id="answer"></div><button onclick="next(true)">Richtig</button><button onclick="next(false)">Falsch</button></div><div class="progress"><div class="bar" id="bar"></div></div><div id="stats"></div></div></main>
<script>
const data={
"Elektrotechnik Grundlagen":[
{q:"Anschauungsmaterial Elektronik: Widerstand, Diode, bipolarer Transistor, Kondensator, Zenerdiode, LM324 (OP-Verstärker)",a:`- Widerstand begrenzt Strom/teilt Spannung; Diode sperrt/leitet in eine Richtung\n- Transistor als Schalter/Verstärker; Kondensator speichert Ladung und glättet\n- Zenerdiode stabilisiert Spannung; LM324 ist ein Operationsverstärker`},
{q:"Wie werden aus 230 AC 12V DC (Trafo, Gleichrichter) Spannungsverläufe aufzeichnen",a:`- Trafo wandelt 230 V AC auf niedrigere Wechselspannung\n- Gleichrichter wandelt Wechselspannung in pulsierende Gleichspannung\n- Kondensator/Regler glättet und stabilisiert auf 12 V DC`},
{q:"Ströme bei Körperschluss (IL1: 11A, IN: 10A; Knotenregel)",a:`- Nach Knotenregel Ströme vergleichen\n- Differenzstrom ist Fehlerstrom\n- 11 A - 10 A = 1 A`},
{q:"Kondensator: Funktion, Ladekurve",a:`- Speichert Ladung\n- Spannung steigt exponentiell\n- Zeitverhalten hängt von R×C ab`}
],
"SPS & Digitaltechnik":[
{q:"Eingangssignale SPS (analog, digital)",a:`- Digital: 0/1\n- Analog: 0–10 V oder 4–20 mA\n- SPS verarbeitet Eingänge nach Programm`},
{q:"Wie arbeitet eine SPS",a:`- Eingänge einlesen\n- Programm zyklisch abarbeiten\n- Ausgänge schalten`},
{q:"Aufbau einer SPS, potentialfreie Kontakte",a:`- Baugruppen: Netzteil, CPU, Eingänge, Ausgänge, Kommunikation\n- Potentialfreie Kontakte liefern keine eigene Spannung\n- Schalten getrennten Stromkreis`},
{q:"Analoge und digitale Signale",a:`- Digital: zwei Zustände\n- Analog: stufenlos\n- Passende I/O-Module nötig`},
{q:"SPS-Ausgänge (Relais/Open Kollektor) und Freilaufdiode",a:`- Relaisausgang ist potentialfrei\n- Open-Kollektor schaltet gegen Masse\n- Bei Relaisspule Freilaufdiode parallel`}
],
"Elektrische Sicherheit":[
{q:"Anschauungsobjekte: FI, LS, FI-LS, MSS, Überstromrelais",a:`- FI schützt bei Fehlerstrom\n- LS schützt vor Überlast/Kurzschluss\n- FI-LS kombiniert beides; MSS/Überstromrelais für Motoren`},
{q:"Schaltpläne: FI, MSS, LS erkennen",a:`- FI: Summenstromwandler/Testtaste\n- LS: thermisch-magnetisch\n- MSS: Motorschutzsymbol + Strombereich`},
{q:"TNC-S Netz einpolig mit Verbraucher",a:`- PEN wird zu PE und N aufgeteilt\n- Verbraucher zwischen L und N\n- PE ans Gehäuse`},
{q:"Nennströme Schmelzsicherungen mit Kennfarben",a:`- Kennfarben zeigen Nennstrom\n- Nur passende Einsätze\n- Schutz nach Leitung/Verbraucher`},
{q:"DIAZED, NEOZED, NH",a:`- DIAZED/NEOZED Schraubsysteme\n- NEOZED kompakter\n- NH für hohe Ströme`},
{q:"Wo wird Schutztrennung eingesetzt",a:`- Trenntransformator\n- Baustellen/Werkstätten/Reparaturen\n- Ein einzelner Verbraucher`},
{q:"Was heißt IP?",a:`- Schutzart\n- 1. Ziffer: Fremdkörper/Berührung\n- 2. Ziffer: Wasser`},
{q:"Schutzklassen",a:`- SK I: Schutzleiter\n- SK II: doppelte Isolierung\n- SK III: Schutzkleinspannung`},
{q:"Fehlerschutzmaßnahmen",a:`- Automatische Abschaltung\n- Schutztrennung\n- Schutzkleinspannung\n- Doppelte/verstärkte Isolierung`},
{q:"ÖVE Schutzkonzept",a:`- Basisschutz\n- Fehlerschutz\n- Zusatzschutz (z.B. FI ≤30mA)`},
{q:"Basisschutz Maßnahmen",a:`- Isolierung\n- Abdeckungen/Umhüllungen\n- Hindernisse/Abstand`},
{q:"Fehlerschutz Maßnahmen",a:`- Automatische Abschaltung\n- Schutzerdung/Nullung\n- Schutztrennung/Schutzkleinspannung`},
{q:"Zusatzschutz Maßnahmen",a:`- FI/RCD ≤ 30mA\n- Zusätzlicher Potentialausgleich\n- Ergänzt Basis- und Fehlerschutz`},
{q:"FI-LS",a:`- Kombiniert FI + LS\n- Schutz gegen Fehlerstrom, Überlast, Kurzschluss\n- Spart Platz`},
{q:"Leitungsschutzschalter C16",a:`- 16 A Nennstrom\n- Thermisch bei Überlast\n- Magnetisch bei Kurzschluss`},
{q:"Schutztrennung bei 2 Geräten",a:`- Grundsätzlich 1 Verbraucher pro Trafo\n- Bei mehreren besondere Bedingungen\n- Keine Erdverbindung`},
{q:"Netzarten TN/TT/IT",a:`- TN: Sternpunkt geerdet\n- TT: Körper separat geerdet, FI oft nötig\n- IT: nicht direkt geerdet, Isolationsüberwachung`},
{q:"FI im TT-Netz",a:`- L und N durch FI\n- PE separat geerdet\n- FI schaltet bei Fehlerstrom ab`},
{q:"Verhalten FI bei Kurzschluss",a:`- FI schützt nicht gegen Überlast/Kurzschluss\n- LS/Sicherung löst aus\n- FI nur bei Differenzstrom`}
],
"Elektrische Maschinen":[
{q:"Stern/Dreieckschaltung Motor",a:`- Stern: kleinere Strangspannung, I_Außen = I_Strang\n- Dreieck: U_Strang = U_Außen, I_Außen größer\n- Typenschild beachten`},
{q:"MSS einstellen (Außenleiter/Strang)",a:`- Außenleiter: Nennstrom Typenschild\n- Strang: Strangstrom\n- Bei Dreieck im Strang etwa I_Außen/√3`},
{q:"Motorschutz MSS/Überstromrelais/PTC",a:`- MSS: Überlast + Kurzschluss\n- Überstromrelais: zeitverzögert bei Überstrom\n- PTC überwacht Wicklungstemperatur`},
{q:"Funktion Asynchronmotor",a:`- Stator erzeugt Drehfeld\n- Rotorstrom wird induziert\n- Rotor läuft mit Schlupf nach`},
{q:"Anlaufstrom",a:`- Beim Start deutlich höher\n- Gegeninduktion fehlt\n- Reduzierung mit Stern-Dreieck/FU`},
{q:"Drehzahländerung Asynchronmotor",a:`- Abhängig von Frequenz, Polpaarzahl, Schlupf\n- Am besten per FU\n- Spannung allein ungeeignet`},
{q:"Anlaufverfahren",a:`- Direktanlauf\n- Stern-Dreieck\n- Sanftstarter/FU`},
{q:"Funktion FU",a:`- Gleichrichter AC→DC\n- Zwischenkreis glättet\n- Wechselrichter erzeugt variable f/U`},
{q:"Motor mit FU langsamer (Kühlung)",a:`- Eigenlüfter kühlt schlechter\n- Überhitzungsgefahr\n- Fremdlüfter/Temperaturüberwachung`},
{q:"Universalmotor Aufbau",a:`- Stator, Rotor/Anker, Kommutator, Bürsten\n- Für AC/DC\n- Hohe Drehzahl`}
],
"Relais & Schaltungen":[
{q:"Wendeschütz- und Stern-Dreieckschaltung",a:`- Wendeschütz vertauscht zwei Außenleiter\n- Verriegelung verhindert Gleichzeitigkeit\n- Stern-Dreieck senkt Anlaufstrom`},
{q:"Bemessungsspannung Schützspule",a:`- Auf Schütz/Spule\n- Datenblatt/Schaltplan\n- z.B. 24V DC oder 230V AC`},
{q:"Relais Funktion und Kontakte",a:`- Spule erzeugt Magnetfeld\n- Schließer/Öffner/Wechsler\n- Schütz für größere Leistungen`},
{q:"Diode beim Relais",a:`- Freilaufdiode gegen Induktionsspannung\n- Parallel zur Spule\n- Bei DC Polung beachten`}
],
"Hydraulik & Pneumatik":[
{q:"Pneumatikzylinder DWZ",a:`- Doppeltwirkender Zylinder\n- Endlagendämpfung bremst Kolben\n- Dämpfung über Stellschrauben`},
{q:"Welcher Zylinder hat mehr Kraft?",a:`- Kraft = Druck × Fläche\n- Größerer Durchmesser → größere Fläche\n- Somit mehr Kraft`},
{q:"Pneumatik/Hydraulik Vor- und Nachteile",a:`- Pneumatik: schnell, sauber; geringere Kräfte\n- Hydraulik: hohe Kräfte; Öl/Leckage\n- Auswahl nach Aufgabe`},
{q:"Aufbau Wartungseinheit",a:`- Filter, Druckregler, Öler\n- Filter entfernt Schmutz/Wasser\n- Regler stellt Arbeitsdruck`},
{q:"Ansteuerung Pneumatikzylinder",a:`- Wegeventile 5/2 oder 5/3\n- elektrisch/pneumatisch/manuell\n- Drosselventile regeln Geschwindigkeit`}
],
"Fertigungstechnik":[
{q:"Innengewinde herstellen",a:`- Kernloch bohren, ansenken, schneiden\n- Kernloch ≈ Nenndurchmesser − Steigung\n- Mit Messschieber prüfen`},
{q:"Gewindebohrer Kennzeichnung",a:`- Vorschneider/Mittelschneider/Fertigschneider\n- Ringe/Aufschrift\n- Größe/Steigung markiert`},
{q:"Schaubild Drehmaschine",a:`- Bett, Spindelstock, Reitstock, Support\n- Werkstück rotiert\n- Werkzeug fährt über Support`},
{q:"Zug- und Leitspindel",a:`- Zugspindel: Vorschub\n- Leitspindel: Gewindeschneiden\n- Übertragen Bewegung`},
{q:"Führungsarten Drehmaschine",a:`- Flach-, Prismen-, Schwalbenschwanzführung\n- Genau und geradlinig\n- Sauber/geschmiert halten`},
{q:"Schutzeinrichtungen/Spannvorrichtungen/Nothalt",a:`- Futterschutz, Späneschutz, Abdeckungen\n- 3-Backen, 4-Backen, Spannzangen\n- Nothalt stoppt sofort`},
{q:"Schneidwerkzeuge und Schneidstoffe",a:`- Drehmeißel, Bohrer, Fräser\n- HSS, Hartmetall, Keramik\n- Auswahl nach Werkstoff/Schnittdaten`}
],
"Werkstofftechnik":[
{q:"Benennung verschiedener Werkstoffe",a:`- Stahl, Gusseisen, Aluminium, Kupfer, Kunststoff\n- Erkennen über Aussehen, Gewicht, Magnetismus\n- Eigenschaften bestimmen Einsatz`},
{q:"Oberflächenschutz",a:`- Schutz vor Korrosion/Verschleiß\n- Lackieren, Verzinken, Brünieren, Eloxieren\n- Oberfläche vorbereiten`}
],
"Mechanische Systeme":[
{q:"Gewindearten",a:`- Befestigungsgewinde: metrisch Regel/Fein\n- Bewegungsgewinde: Trapez/Rund\n- Wandeln Dreh- in Längsbewegung`},
{q:"Messen einer Schraube (M16)",a:`- Außendurchmesser messen\n- Steigung mit Gewindelehre\n- M16 = 16 mm Nenndurchmesser`}
],
"Montage & Instandhaltung":[
{q:"Verbindungsarten lösbar/unlösbar",a:`- Lösbar: Schrauben, Bolzen, Passfedern\n- Unlösbar: Schweißen, Nieten, Kleben\n- Auswahl nach Belastung/Wartung`},
{q:"Schraubverbindung gegen Lösen sichern",a:`- Federring, Sicherungsmutter, Klemmteil\n- Schraubensicherungslack\n- Splint/Sicherungsblech`},
{q:"Lösbare/unlösbare Verbindungen mit Beispielen",a:`- Lösbar: Schrauben, Stifte, Passfedern\n- Unlösbar: Schweißen, Löten, Kleben, Nieten\n- Lösbar ist wartungsfreundlicher`}
],
"Mess- & Regeltechnik":[
{q:"Messschieber Teile und Anwendung",a:`- Feste/bewegliche Schenkel, Tiefenmaß, Skala, Nonius\n- Außen-, Innen- und Tiefenmaß\n- Nonius für feines Ablesen`},
{q:"Bügelmessschraube Anwendung",a:`- Genaues Messen kleiner Außenmaße\n- Ablesung über Spindel/Trommel\n- Ratsche für gleiche Messkraft`},
{q:"4-20mA Schnittstelle",a:`- Stromsignal für Messwerte\n- 4 mA Anfang, 20 mA Ende\n- Unter 4 mA deutet Leitungsfehler an`},
{q:"FI-Schutzschaltung prüfen",a:`- FI/RCD-Prüfgerät bzw. Installationstester\n- Misst Auslösestrom und -zeit\n- Prüft Schutzfunktion`},
{q:"Schleifenwiderstand berechnen",a:`- Zs = U0 / Ia\n- Zs muss klein genug sein\n- Damit Schutzorgan sicher auslöst`},
{q:"Isolationswiderstand messen",a:`- Mit Isolationsmessgerät hoher Prüfspannung\n- Zwischen aktiven Leitern und PE\n- Multimeter zu geringe Prüfspannung`}
],
"Sensorik & Aktoren":[
{q:"Kapazitiver/Induktiver Sensor",a:`- Induktiv erkennt Metall\n- Kapazitiv erkennt auch Nichtmetalle/Flüssigkeiten\n- Einbauabstände und bündig/nicht bündig beachten`},
{q:"Drucksensor, induktiv, kapazitiv, Reflexlichttaster",a:`- Drucksensor misst Druck\n- Induktiv: Metall, kapazitiv: viele Materialien\n- Reflexlichttaster über reflektiertes Licht`}
]
};
let selected=[],questions=[],index=0,correct=0;const catDiv=document.getElementById('categories');
Object.keys(data).forEach(cat=>{const d=document.createElement('div');d.className='category';d.innerHTML='<input type="checkbox" value="'+cat+'"> <span>'+cat+'</span><span class="pill">'+data[cat].length+' Fragen</span>';d.onclick=(e)=>{if(e.target.tagName!=='INPUT')d.querySelector('input').checked=!d.querySelector('input').checked};catDiv.appendChild(d)});
function startQuiz(){selected=[...document.querySelectorAll('.category input:checked')].map(c=>c.value);if(!selected.length)return alert('Kategorie wählen!');questions=[];selected.forEach(c=>questions.push(...data[c]));questions.sort(()=>Math.random()-0.5);index=0;correct=0;document.getElementById('quiz').style.display='block';showQ()}
function showQ(){document.getElementById('answer').style.display='none';document.getElementById('question').innerText=questions[index].q;document.getElementById('answer').innerText=questions[index].a}
function showAnswer(){document.getElementById('answer').style.display='block'}
function next(ok){if(ok)correct++;index++;document.getElementById('bar').style.width=(index/questions.length*100)+'%';document.getElementById('stats').innerText=correct+' / '+index;if(index>=questions.length){alert('Fertig: '+correct+'/'+questions.length);location.reload()}else showQ()}
</script>
</body></html>
