<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danis Fragen vom letzten Jahr</title>
<style>
:root {
 --primary-color:#f0c419;
 --secondary-color:#d4a80f;
 --background:#fffdf5;
 --card-bg:#ffffff;
 --text-color:#333;
 --accent-color:#f7d75b;
}
body{font-family:Arial;margin:0;background:var(--background);color:var(--text-color);} 
header{background:linear-gradient(45deg,var(--primary-color),var(--secondary-color));color:#222;padding:1.5rem;text-align:center;}
main{max-width:900px;margin:auto;padding:1rem;}
.category{background:white;padding:10px;margin:5px;border-radius:6px;cursor:pointer;border:1px solid #ddd;display:flex;align-items:center;gap:8px;}
.pill{margin-left:auto;background:#fff6d6;color:#8a6d00;border-radius:999px;padding:2px 8px;font-size:12px;white-space:nowrap;}
.question-box{background:white;padding:1rem;border-radius:6px;margin-top:1rem;}
.answer{background:#fff6d6;padding:1rem;margin-top:1rem;border-radius:6px;display:none;white-space:pre-line;}
button{background:var(--primary-color);color:#222;border:none;padding:10px;border-radius:4px;margin-top:10px;cursor:pointer;}
a.back-link{display:inline-block;background:var(--primary-color);color:#222;text-decoration:none;padding:10px;border-radius:4px;margin-top:10px;}
.progress{height:10px;background:#ddd;margin-top:10px;}
.bar{height:100%;background:var(--accent-color);width:0%;}
</style>
</head>
<body>
<header><h1>Danis Fragen vom letzten Jahr</h1><p><a class="back-link" href="index.html">Zur Landing Page</a></p></header>
<main>
<div id="categories"></div>
<button onclick="startQuiz()">Start</button>
<div id="quiz" style="display:none;">
<div class="question-box">
<h3 id="question"></h3>
<button onclick="showAnswer()">Antwort anzeigen</button>
<div class="answer" id="answer"></div>
<button onclick="next(true)">Richtig</button>
<button onclick="next(false)">Falsch</button>
</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="stats"></div>
</div>
</main>
<script id="questionsJson" type="application/json">
{
  "Elektrotechnik Grundlagen": [
    {"q":"Anschauungsmaterial Elektronik: Widerstand, Diode, bipolarer Transistor, Kondensator, Zenerdiode, LM324 (OP- Verstärker) jeweils mit Anwendungen und Anschlüssen","a":"- Widerstand begrenzt Strom/teilt Spannung; Diode sperrt/leitet in eine Richtung\n- Transistor als Schalter/Verstärker; Kondensator speichert Ladung und glättet\n- Zenerdiode stabilisiert Spannung; LM324 ist ein Operationsverstärker für Signalverarbeitung"},
    {"q":"Wie werden aus 230 AC 12V DC (Trafo, Gleichrichter) Spannungsverläufe aufzeichnen","a":"- Trafo wandelt 230 V AC auf niedrigere Wechselspannung\n- Gleichrichter wandelt Wechselspannung in pulsierende Gleichspannung\n- Kondensator/Regler glättet und stabilisiert auf 12 V DC"},
    {"q":"Ströme bei Körperschluss lt. nachfolgender Zeichnung (IL1: 11A, IN: 10A; Knotenregel)","a":"- Nach Knotenregel: zufließende und abfließende Ströme vergleichen\n- Differenzstrom ist der Fehlerstrom\n- Hier: 11 A - 10 A = 1 A Fehlerstrom"},
    {"q":"Kondensator: Funktion, Ladekurve","a":"- Kondensator speichert elektrische Ladung\n- Beim Laden steigt die Spannung exponentiell an\n- Zeitverhalten hängt von R × C ab"}
  ],
  "SPS & Digitaltechnik": [
    {"q":"Eingangssignale SPS (analog, digital)","a":"- Digitale Signale: 0/1, z. B. Taster, Endschalter, Sensor-Ausgang\n- Analoge Signale: veränderliche Werte, z. B. 0–10 V oder 4–20 mA\n- SPS verarbeitet Eingänge nach Programm und schaltet Ausgänge"},
    {"q":"Wie arbeitet eine SPS.","a":"- Eingänge einlesen\n- Programm zyklisch abarbeiten\n- Ausgänge entsprechend schalten"},
    {"q":"Aufbau einer SPS (Baugruppen), was sind potentialfreie Kontakte","a":"- Baugruppen: Netzteil, CPU, Eingänge, Ausgänge, Kommunikationsmodule\n- Potentialfreie Kontakte liefern selbst keine Spannung\n- Sie schalten nur einen getrennten Stromkreis"},
    {"q":"Analoge und digitale Signale","a":"- Digital: zwei Zustände, z. B. 0/1 oder Ein/Aus\n- Analog: stufenloser Wert, z. B. 0–10 V\n- SPS benötigt passende Eingangs-/Ausgangsmodule"},
    {"q":"Ausgänge SPS (Relais Ausgang und Open Kollektor), was wird benötigt, wenn mit einem Open Kollektor Ausgang ein Relais geschalten wird? (Freilaufdiode)","a":"- Relaisausgang ist potentialfrei und für verschiedene Lasten nutzbar\n- Open-Kollektor schaltet meist gegen Masse\n- Bei Relaisspule Freilaufdiode parallel zur Spule verwenden"}
  ],
  "Elektrische Sicherheit": [
    {"q":"Anschauungsobjekte: FI, LS, FI-LS, MSS, Überstromrelais","a":"- FI schützt bei Fehlerstrom gegen elektrischen Schlag\n- LS schützt Leitung vor Überlast und Kurzschluss\n- FI-LS kombiniert FI und LS; MSS/Überstromrelais schützen Motoren"},
    {"q":"Schaltpläne: FI, MSS, LS usw. erkennen","a":"- FI erkennt man an Summenstromwandler/Testtaste\n- LS an thermisch-magnetischer Auslösung\n- MSS an Motorschutzsymbol und einstellbarem Strombereich"},
    {"q":"TNC-S Netz einpolig mit einem Verbraucher","a":"- TN-C-S: PEN wird in PE und N aufgeteilt\n- Verbraucher liegt zwischen Außenleiter und Neutralleiter\n- Schutzleiter wird mit Gehäuse verbunden"}
  ]
}
</script>
<script>
const data = JSON.parse(document.getElementById('questionsJson').textContent);
let selected=[],questions=[],index=0,correct=0;
const catDiv=document.getElementById("categories");
Object.keys(data).forEach(cat=>{
 let d=document.createElement("div");
 d.className="category";
 d.innerHTML='<input type="checkbox" value="'+cat+'"> <span>'+cat+'</span><span class="pill">'+data[cat].length+' Fragen</span>';
 d.onclick=(e)=>{ if(e.target.tagName!=="INPUT") d.querySelector("input").checked=!d.querySelector("input").checked; };
 catDiv.appendChild(d);
});
function startQuiz(){
 selected=[...document.querySelectorAll(".category input:checked")].map(c=>c.value);
 if(selected.length===0)return alert("Kategorie wählen!");
 questions=[]; selected.forEach(c=>questions.push(...data[c])); questions.sort(()=>Math.random()-0.5);
 index=0; correct=0; document.getElementById("quiz").style.display="block"; showQ();
}
function showQ(){document.getElementById("answer").style.display="none";document.getElementById("question").innerText=questions[index].q;document.getElementById("answer").innerText=questions[index].a;}
function showAnswer(){document.getElementById("answer").style.display="block";}
function next(ok){if(ok)correct++;index++;document.getElementById("bar").style.width=(index/questions.length*100)+"%";document.getElementById("stats").innerText=correct+" / "+index;if(index>=questions.length){alert("Fertig: "+correct+"/"+questions.length);location.reload();}else showQ();}
</script>
</body>
</html>
