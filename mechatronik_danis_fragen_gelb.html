<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Danis Fragen vom letzten Jahr</title><style>
:root{--primary-color:#f0c419;--secondary-color:#d4a80f;--background:#fffdf5;--text-color:#333;--accent-color:#f7d75b}
body{font-family:Arial;margin:0;background:var(--background);color:var(--text-color)}header{background:linear-gradient(45deg,var(--primary-color),var(--secondary-color));padding:1.5rem;text-align:center}main{max-width:980px;margin:auto;padding:1rem}.category{background:#fff;padding:10px;margin:5px;border-radius:6px;cursor:pointer;border:1px solid #ddd;display:flex;align-items:center;gap:8px}.pill{margin-left:auto;background:#fff6d6;color:#8a6d00;border-radius:999px;padding:2px 8px;font-size:12px}.question-box{background:#fff;padding:1rem;border-radius:6px;margin-top:1rem}.answer{background:#fff6d6;padding:1rem;margin-top:1rem;border-radius:6px;display:none;white-space:pre-line}button{background:var(--primary-color);color:#222;border:none;padding:10px;border-radius:4px;margin-top:10px;cursor:pointer}a.back-link{display:inline-block;background:var(--primary-color);color:#222;text-decoration:none;padding:10px;border-radius:4px}.progress{height:10px;background:#ddd;margin-top:10px}.bar{height:100%;background:var(--accent-color);width:0%}
</style></head><body>
<header><h1>Danis Fragen vom letzten Jahr</h1><p><a class="back-link" href="index.html">Zur Landing Page</a></p></header>
<main><div id="categories"></div><button onclick="startQuiz()">Start</button><div id="quiz" style="display:none;"><div class="question-box"><h3 id="question"></h3><button onclick="showAnswer()">Antwort anzeigen</button><div class="answer" id="answer"></div><button onclick="next(true)">Richtig</button><button onclick="next(false)">Falsch</button></div><div class="progress"><div class="bar" id="bar"></div></div><div id="stats"></div></div></main>
<script>
const data={
"Elektrotechnik Grundlagen":[{q:"Anschauungsmaterial Elektronik",a:"- Widerstand/Diode/Transistor/Kondensator/Zener/LM324 mit Anwendung und Anschlüssen"},{q:"230V AC zu 12V DC",a:"- Trafo senkt AC\n- Gleichrichter macht pulsierende DC\n- Kondensator/Regler glättet"},{q:"Ströme bei Körperschluss",a:"- Knotenregel\n- Differenzstrom = Fehlerstrom\n- 11A-10A=1A"},{q:"Kondensator Funktion",a:"- Speichert Ladung\n- Exponentielle Ladekurve\n- R×C bestimmt Zeit"}],
"SPS & Digitaltechnik":[{q:"Eingangssignale SPS",a:"- Digital 0/1\n- Analog 0-10V/4-20mA\n- SPS verarbeitet nach Programm"},{q:"Wie arbeitet SPS",a:"- Einlesen\n- Zyklus\n- Ausgänge schalten"},{q:"Aufbau SPS + potentialfrei",a:"- Netzteil,CPU,Ein/Ausgänge,Kommunikation\n- Potentialfrei liefert keine eigene Spannung"},{q:"Analoge/digitale Signale",a:"- Digital zwei Zustände\n- Analog stufenlos"},{q:"SPS Ausgang Open Kollektor",a:"- Open Kollektor gegen Masse\n- Relais mit Freilaufdiode"}],
"Elektrische Sicherheit":[{q:"FI/LS/FI-LS/MSS",a:"- FI Fehlerstromschutz\n- LS Überlast/Kurzschluss\n- FI-LS kombiniert"},{q:"Schaltpläne erkennen",a:"- FI Testtaste\n- LS thermisch-magnetisch\n- MSS einstellbarer Strom"},{q:"TN-C-S",a:"- PEN in PE+N aufgeteilt"},{q:"Nennströme Schmelzsicherungen",a:"- Kennfarbe zeigt Nennstrom"},{q:"DIAZED/NEOZED/NH",a:"- Schraubsicherung, NH für hohe Ströme"},{q:"Wo Schutztrennung",a:"- Trenntrafo, meist ein Verbraucher"},{q:"IP Schutzart",a:"- 1. Ziffer Fremdkörper\n- 2. Ziffer Wasser"},{q:"Schutzklassen",a:"- SK I/II/III"},{q:"Fehlerschutzmaßnahmen",a:"- Abschaltung, Schutztrennung, Schutzkleinspannung, Isolation"},{q:"ÖVE Schutzkonzept",a:"- Basis/Fehler/Zusatzschutz"},{q:"Basisschutz",a:"- Isolierung, Abdeckung, Abstand"},{q:"Fehlerschutz",a:"- automatische Abschaltung etc."},{q:"Zusatzschutz",a:"- FI <=30mA"},{q:"FI-LS",a:"- Kombigerät"},{q:"LSS C16",a:"- 16A, thermisch/magnetisch"},{q:"Netzarten TN TT IT",a:"- Grundprinzipien"},{q:"FI im TT",a:"- L+N durch FI, PE separat"},{q:"FI bei Kurzschluss",a:"- LS/Sicherung löst aus"}],
"Elektrische Maschinen":[{q:"Stern/Dreieck",a:"- Spannungs-/Strombezug"},{q:"MSS Einstellung",a:"- Außenleiter Nennstrom\n- Strang Strangstrom"},{q:"Motorschutz",a:"- MSS/Überstrom/PTC"},{q:"Asynchronmotor",a:"- Drehfeld, Induktion, Schlupf"},{q:"Anlaufstrom",a:"- höher beim Start"},{q:"Drehzahländerung",a:"- über Frequenz/FU"},{q:"Anlaufverfahren",a:"- Direkt, Stern-Dreieck, Sanftstarter/FU"},{q:"Funktion FU",a:"- Gleichrichter, Zwischenkreis, Wechselrichter"},{q:"FU langsamer = Kühlung",a:"- ggf. Fremdlüfter"},{q:"Universalmotor",a:"- Stator/Anker/Kommutator/Bürsten"}],
"Relais & Schaltungen":[{q:"Wendeschütz/Stern-Dreieck",a:"- Drehrichtungswechsel/Verriegelung/Anlaufstrom"},{q:"Schützspule Bemessung",a:"- auf Spule/Datenblatt"},{q:"Relais vs Schütz",a:"- Kontakte Schließer/Öffner/Wechsler"},{q:"Freilaufdiode",a:"- parallel zur Spule"}],
"Hydraulik & Pneumatik":[{q:"Pneumatikzylinder DWZ",a:"- doppeltwirkend mit Endlagendämpfung"},{q:"Welcher Zylinder mehr Kraft",a:"- Kraft = Druck × Fläche"},{q:"Pneumatik/Hydraulik",a:"- Vor-/Nachteile"},{q:"Wartungseinheit",a:"- Filter, Regler, Öler"},{q:"Ansteuerung Zylinder",a:"- Wegeventile/Drosseln"}],
"Fertigungstechnik":[{q:"Innengewinde herstellen",a:"- Kernloch/ansenken/schneiden"},{q:"Gewindebohrer Kennzeichnung",a:"- Vor/Mittel/Fertigschneider"},{q:"Drehmaschine Aufbau",a:"- Bett,Spindelstock,Reitstock,Support"},{q:"Zug-/Leitspindel",a:"- Vorschub/Gewindeschneiden"},{q:"Führungsarten",a:"- Flach/Prismen/Schwalbenschwanz"},{q:"Schutzeinrichtungen",a:"- Futterschutz etc."},{q:"Schneidwerkzeuge",a:"- HSS/HM/Keramik"}],
"Werkstofftechnik":[{q:"Werkstoffe benennen",a:"- Stahl, Guss, Alu, Cu, Kunststoff"},{q:"Oberflächenschutz",a:"- Lackieren, Verzinken, Brünieren, Eloxieren"}],
"Mechanische Systeme":[{q:"Gewindearten",a:"- Befestigungs- und Bewegungsgewinde"},{q:"Schraube M16 messen",a:"- Durchmesser/Steigung"}],
"Montage & Instandhaltung":[{q:"Verbindungsarten",a:"- lösbar/unlösbar"},{q:"Schraubensicherung",a:"- Federring, Mutter, Lack, Splint"},{q:"Lösbar/unlösbar Beispiele",a:"- Schrauben vs Schweißen/Nieten"}],
"Mess- & Regeltechnik":[{q:"Messschieber",a:"- Teile/Anwendung/Nonius"},{q:"Bügelmessschraube",a:"- genaue Außenmaße"},{q:"4-20mA",a:"- 4mA Anfang, 20mA Ende"},{q:"FI prüfen",a:"- RCD-Tester"},{q:"Schleifenwiderstand",a:"- Zs=U0/Ia"},{q:"Isolationsmessung",a:"- mit Isolationsmessgerät"}],
"Sensorik & Aktoren":[{q:"Induktiv/Kapazitiv",a:"- Metall vs viele Materialien"},{q:"Drucksensor/Reflexlichttaster",a:"- Prinzipien"}]
};
let selected=[],questions=[],index=0,correct=0;const catDiv=document.getElementById('categories');Object.keys(data).forEach(cat=>{const d=document.createElement('div');d.className='category';d.innerHTML='<input type="checkbox" value="'+cat+'"> <span>'+cat+'</span><span class="pill">'+data[cat].length+' Fragen</span>';d.onclick=e=>{if(e.target.tagName!=='INPUT')d.querySelector('input').checked=!d.querySelector('input').checked};catDiv.appendChild(d)});
function startQuiz(){selected=[...document.querySelectorAll('.category input:checked')].map(c=>c.value);if(!selected.length)return alert('Kategorie wählen!');questions=[];selected.forEach(c=>questions.push(...data[c]));questions.sort(()=>Math.random()-0.5);index=0;correct=0;document.getElementById('quiz').style.display='block';showQ()}
function showQ(){document.getElementById('answer').style.display='none';document.getElementById('question').innerText=questions[index].q;document.getElementById('answer').innerText=questions[index].a}
function showAnswer(){document.getElementById('answer').style.display='block'}
function next(ok){if(ok)correct++;index++;document.getElementById('bar').style.width=(index/questions.length*100)+'%';document.getElementById('stats').innerText=correct+' / '+index;if(index>=questions.length){alert('Fertig: '+correct+'/'+questions.length);location.reload()}else showQ()}
</script></body></html>
