    {"q":"Netzarten tw. selbst skizzieren, tw. aus Vorlage erklären","a":"- TN-System: Sternpunkt geerdet, Körper über PE/PEN verbunden\n- TT-System: Körper separat geerdet, FI meist erforderlich\n- IT-System: Netz nicht direkt geerdet, Isolationsüberwachung nötig"},

    {"q":"Selektivität bei FIs","a":"- Vorgeschalteter FI soll später auslösen als nachgeschalteter\n- Selektive FI sind zeitverzögert\n- Dadurch schaltet nur der fehlerhafte Stromkreis ab"},

  "Werkstofftechnik": [
    {"q":"Benennung verschiedener Werkstoffe (Anschauungsmaterial) (FT)","a":"- Werkstoffe z. B. Stahl, Gusseisen, Aluminium, Kupfer, Kunststoff\n- Erkennen nach Aussehen, Gewicht, Magnetismus, Kennzeichnung\n- Eigenschaften bestimmen Einsatzgebiet"},
    {"q":"Oberflächenschutz von Werkstoffen (FT)","a":"- Schützt vor Korrosion und Verschleiß\n- Beispiele: Lackieren, Verzinken, Brünieren, Eloxieren\n- Oberfläche muss vorher gereinigt/vorbereitet werden"}
  ],
  "Sensorik & Aktoren": [
    {"q":"Sensoren: Kapazitiver, Induktiver mit Erklärung der Funktion und des Einbaus","a":"- Induktiver Sensor erkennt metallische Objekte\n- Kapazitiver Sensor erkennt auch Nichtmetalle/Flüssigkeiten\n- Einbauabstände und bündig/nicht bündig beachten"},
    {"q":"Drucksensor, induktiver Sensor, kapazitiver Sensor, Reflexlichttaster","a":"- Drucksensor misst Druck und liefert Schaltsignal/Analogsignal\n- Induktiv: Metall; kapazitiv: viele Materialien\n- Reflexlichttaster erkennt Objekte über reflektiertes Licht"}
  ]
}
</script>
<script>
const data = JSON.parse(document.getElementById('questionsJson').textContent);
let selected=[],questions=[],index=0,correct=0;const catDiv=document.getElementById('categories');

const bereichMap={
  1:["Elektrotechnik Grundlagen"],
  2:["Elektrische Sicherheit","Montage & Instandhaltung"],
  3:["Relais & Schaltungen","Werkstofftechnik","Fertigungstechnik","Elektrische Maschinen"],
  4:["Hydraulik & Pneumatik","SPS & Digitaltechnik"],
  5:["Sensorik & Aktoren","Mess- & Regeltechnik","Mechanische Systeme"]
};
function applyBereichFilter(bereich){
  const targets=new Set((bereichMap[bereich]||[]).filter(cat=>data[cat]));
  document.querySelectorAll('.category input').forEach(cb=>{cb.checked=targets.has(cb.value);});
  document.querySelectorAll('.bereich-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.bereich===String(bereich)));
}
document.getElementById('bereichButtons').addEventListener('click',e=>{const btn=e.target.closest('.bereich-btn');if(!btn)return;applyBereichFilter(btn.dataset.bereich);});
Object.keys(data).forEach(cat=>{const d=document.createElement('div');d.className='category';d.innerHTML='<input type="checkbox" value="'+cat+'"> <span>'+cat+'</span><span class="pill">'+data[cat].length+' Fragen</span>';d.addEventListener('click',(e)=>{if(e.target.tagName!=="INPUT")d.querySelector('input').checked=!d.querySelector('input').checked;});catDiv.appendChild(d);});
function startQuiz(){selected=[...document.querySelectorAll('.category input:checked')].map(c=>c.value);if(!selected.length){alert('Kategorie wählen!');return;}questions=[];selected.forEach(c=>questions.push(...data[c]));questions.sort(()=>Math.random()-0.5);index=0;correct=0;document.getElementById('quiz').style.display='block';showQ();}
function showQ(){const item=questions[index];document.getElementById('answer').style.display='none';document.getElementById('question').innerText=item.q;document.getElementById('answer').innerText=item.a;}
function showAnswer(){document.getElementById('answer').style.display='block';}
function next(ok){if(ok)correct++;index++;document.getElementById('bar').style.width=(index/questions.length*100)+'%';document.getElementById('stats').innerText=correct+' / '+index;if(index>=questions.length){alert('Fertig: '+correct+'/'+questions.length);location.reload();}else{showQ();}}
//test
</script>
</body></html>
