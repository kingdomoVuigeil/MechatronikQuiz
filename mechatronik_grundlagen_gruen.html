
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechatronik Grundlagen Lernspiel</title>
<style>
:root {
 --primary-color:#28a745;
 --secondary-color:#1e7e34;
 --background:#f7f9fc;
 --card-bg:#ffffff;
 --text-color:#333;
 --accent-color:#20c997;
}
body{font-family:Arial;margin:0;background:var(--background);color:var(--text-color);}
header{background:linear-gradient(45deg,var(--primary-color),var(--secondary-color));color:white;padding:1.5rem;text-align:center;}
main{max-width:900px;margin:auto;padding:1rem;}
.category{background:white;padding:10px;margin:5px;border-radius:6px;cursor:pointer;border:1px solid #ddd;display:flex;align-items:center;gap:8px;}
.pill{margin-left:auto;background:#e9f7ef;color:#1e7e34;border-radius:999px;padding:2px 8px;font-size:12px;white-space:nowrap;}
.question-box{background:white;padding:1rem;border-radius:6px;margin-top:1rem;}
.answer{background:#eef9f0;padding:1rem;margin-top:1rem;border-radius:6px;display:none;}
button{background:var(--primary-color);color:white;border:none;padding:10px;border-radius:4px;margin-top:10px;}
.progress{height:10px;background:#ddd;margin-top:10px;}
.bar{height:100%;background:var(--accent-color);width:0%;}
</style>
</head>
<body>

<header><h1>Mechatronik Grundlagen Quiz</h1></header>

<main>
<div id="categories"></div>
<button onclick="startQuiz()">Start</button>

<div id="quiz" style="display:none;">
<div class="question-box">
<h3 id="question"></h3>
<button onclick="showAnswer()">Antwort anzeigen</button>
<div class="answer" id="answer"></div>
<button onclick="next(true)">Richtig</button>
<button onclick="next(false)">Falsch</button>
</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="stats"></div>
</div>
</main>

<script id="questionsJson" type="application/json">
{
"Elektrotechnik Grundlagen":[
{"q":"Was besagt das Ohmsche Gesetz?","a":"U = R * I. Spannung ist gleich Widerstand mal Strom."},
{"q":"Welche Arten der Wärmeübertragung gibt es?","a":"Wärmeleitung, Konvektion und Wärmestrahlung."},
{"q":"Wie funktioniert ein Transformator?","a":"Durch elektromagnetische Induktion wird Spannung zwischen Primär- und Sekundärwicklung übertragen."}
],
"Sensorik":[
{"q":"Was ist ein induktiver Sensor?","a":"Ein Sensor der metallische Objekte über ein elektromagnetisches Feld erkennt."},
{"q":"Was ist ein kapazitiver Sensor?","a":"Er erkennt Materialien durch Änderung der Kapazität, auch nicht-metallische Stoffe."}
],
"Maschinen":[
{"q":"Was ist ein Drehstrommotor?","a":"Ein Elektromotor der mit Drehstrom betrieben wird und ein rotierendes Magnetfeld nutzt."},
{"q":"Was bedeutet Schutzart IP?","a":"Sie beschreibt den Schutz gegen Fremdkörper und Wasser (z.B. IP65)."}
]
}
</script>

<script>
const data = JSON.parse(document.getElementById('questionsJson').textContent);

let selected=[],questions=[],index=0,correct=0;

const catDiv=document.getElementById("categories");

Object.keys(data).forEach(cat=>{
 let d=document.createElement("div");
 d.className="category";
 d.innerHTML='<input type="checkbox" value="'+cat+'"> <span>'+cat+'</span><span class="pill">'+data[cat].length+' Fragen</span>';
 d.onclick=(e)=>{
  if(e.target.tagName!=="INPUT") d.querySelector("input").checked=!d.querySelector("input").checked;
 };
 catDiv.appendChild(d);
});

function startQuiz(){
 selected=[...document.querySelectorAll(".category input:checked")].map(c=>c.value);
 if(selected.length===0)return alert("Kategorie wählen!");
 questions=[];
 selected.forEach(c=>questions.push(...data[c]));
 questions.sort(()=>Math.random()-0.5);
 document.getElementById("quiz").style.display="block";
 showQ();
}

function showQ(){
 document.getElementById("answer").style.display="none";
 document.getElementById("question").innerText=questions[index].q;
 document.getElementById("answer").innerText=questions[index].a;
}

function showAnswer(){
 document.getElementById("answer").style.display="block";
}

function next(ok){
 if(ok)correct++;
 index++;
 document.getElementById("bar").style.width=(index/questions.length*100)+"%";
 document.getElementById("stats").innerText=correct+" / "+index;
 if(index>=questions.length){
  alert("Fertig: "+correct+"/"+questions.length);
  location.reload();
 }else showQ();
}
</script>

</body>
</html>
