<script id="questionsJson" type="application/json">{"Hydraulik & Pneumatik":[{"id":"D1","question":"D1: In welche Gruppen lassen sich Greifersysteme einteilen? Nennen Sie 2. Nenne Arten von Greifer-Systemen. Nenne 3 Kriterien bei der Auswahl eines Greifersystem?","answer":"Greifersysteme lassen sich z. B. in mechanische, pneumatische, magnetische und Vakuum-Greifer einteilen. Auswahlkriterien sind Werkstückform, Gewicht, Oberfläche, Taktzeit, Umgebung, verfügbare Energie und erforderliche Haltekraft.","images":[]},{"id":"D3","question":"D3: Welche Vorteile haben Geführte pneumatische Antriebe gegenüber gewöhnlicher Zylinder mit Kolbenstange? Was sind Kolbenstangenlose Zylinder? Anschauungsmittel: Schaubild Welche zwei unterschiedlichen Funktionsprinzipien für kolbenstangenlose Zylinder gibt es? Beschreiben Sie einen davon.","answer":"Geführte Antriebe nehmen Querkräfte und Momente besser auf und führen die Last genauer. Kolbenstangenlose Zylinder übertragen die Kolbenbewegung ohne außenliegende Kolbenstange, z. B. magnetisch gekoppelt oder über einen mechanischen Mitnehmer/Schlitz.","images":[]},{"id":"D7","question":"D7: Zählen Sie 3 Vor- und Nachteile der Pneumatik auf. Wie kann das Geräusch der Abluft bei der Pneumatik gedämpft werden?","answer":"Vorteile der Pneumatik sind einfache Energieverteilung, schnelle Bewegungen, Überlastsicherheit und Sauberkeit. Nachteile sind begrenzte Kräfte, Kompressibilität, Lärm und Energieverluste. Abluft wird mit Schalldämpfern gedämpft.","images":[]},{"id":"D8","question":"D8: Welche Möglichkeiten der Vakuumerzeuger kennen Sie? Beschreiben Sie Sinngemäß das Funktionsprinzip eines Vakuum-Ejektors anhand des Schaubildes? [©2023, Manfred Hofer]","answer":"Vakuum kann mit mechanischen Vakuumpumpen oder mit Ejektoren erzeugt werden. Beim Vakuum-Ejektor strömt Druckluft durch eine Düse; die hohe Strömungsgeschwindigkeit erzeugt Unterdruck und saugt Luft aus dem Greifraum ab.","images":["data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA  Zahnräder beachten) Welche Reparaturmöglichkeiten haben Sie bei einer Zahnradpumpe? Kann man bei einer Zahnradpumpe den Volumenstrom verändern, wenn eine konstante Pumpendrehzahl gegeben ist?","answer":"Riemen-, Ketten- und Zahnradantriebe übertragen Drehbewegung und Drehmoment. Riemen laufen leise und können rutschen, Ketten übertragen formschlüssig über größere Abstände, Zahnräder übertragen präzise und schlupffrei bei kleinen Achsabständen.","images":[]},{"id":"E29","question":"E29: Nennen Sie 3 wichtige Wartungsarbeiten an Hydraulikanlagen! Was müssen Sie tun, bevor Sie an einer Hydroanlage mit Hydraulikspeicher Wartungsarbeiten durchführen? Nennen Sie Hydraulikspeicher! Welches Füllgas wird bei Hydrospeichern meist verwendet?","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]}],"SPS & Digitaltechnik":[{"id":"D20","question":"D20: Was versteht man unter einer Prozessvisualisierung? Vorteile der Prozessvisualisierung! Nennen Sie 3 Geräte zur Prozessvisualisierung. 1","answer":"Prozessvisualisierung stellt Maschinenzustände, Messwerte, Alarme und Bedienfunktionen grafisch dar. Vorteile sind bessere Übersicht, schnelle Fehlerdiagnose und einfache Bedienung. Geräte: HMI-Panel, Industrie-PC, Leitstand/SCADA, Tablet mit Bedienoberfläche.","images":[]},{"id":"E12","question":"E12: Ein Näherungsschalter schaltet nicht. Nennen Sie je mögliche Fehlerquellen inkl. Fehlerbehebungsmaßnahmen. Auf was achten Sie, anhand eines praktischen Beispiels, wenn Sie an einer Automatisierten Anlage die Erst Inbetriebnahme durchführen. (Sinngemäß) Wozu dient ein Inbetriebnahme Protokoll? (Nenne 2) 1","answer":"Inbetriebnahme ist das erstmalige sichere Einschalten, Prüfen, Einstellen und Freigeben einer Anlage. Dazu gehöre n Material, Oberfläche, Luftstrom, Bauform und Montage ab. Wärmeleitpaste füllt Unebenheiten zwischen Bauteil und Kühlkörper.","images":[]},{"id":"D41","question":"D41: Welche zwei Hauptgruppen von Sensoren kennen Sie? Erklären Sie Sinngemäß den Unterschied dieser beiden Hauptgruppen und nennen sie jeweils ein praktisches Beispiel.","answer":"Sensoren erfassen physikalische Größen. Man unterscheidet binäre Sensoren, die nur zwei Zustände liefern, und analoge Sensoren, die einen kontinuierlichen Messwert liefern. Beispiele: induktiver Näherungsschalter binär, Potenziometer oder Drucksensor analog.","images":[]},{"id":"D42","question":"D42: Was sind Analoge Sensoren? Erklären Sie die Funktionsweise eines Linearpotenziometer. Nennen Sie Anwendungsbeispiele von Linear und Drehpotenziometern.","answer":"Sensoren erfassen physikalische Größen. Man unterscheidet binäre Sensoren, die nur zwei Zustände liefern, und analoge Sensoren, die einen kontinuierlichen Messwert liefern. Beispiele: induktiver Näherungsschalter binär, Potenziometer oder Drucksensor analog.","images":[]},{"id":"E4","question":"E4: Es soll ein Anschluss für einen Drehstrommotor installiert werden. Von welchen Faktoren hängt die Dimensionierung der Zuleitung ab? Welche Arten von Motorschutz können eingesetzt werden? Welche Überprüfungen/Einstellungen sind vor Inbetriebnahme eines Motors vorzunehmen","answer":"Elektrische Maschinen wandeln elektrische in mechanische Energie oder umgekehrt. Wichtige Bauarten sind Gleichstrommotor, Asynchronmotor, Synchronmotor und Schrittmotor. Auswahlkriterien sind Drehmoment, Drehzahl, Leistung, Versorgung, Regelbarkeit und Umgebung.","images":[]},{"id":"E8","question":"E8: Sie müssen für eine Anlage die Steuerung entwerfen. Nach welchen Faktoren wählen Sie die Steuerung aus und warum sind diese Faktoren für Sie entscheidend (5 Faktoren). Nennen Sie je Vor- und Nachteile einer SPS zu einer konventionellen Schützensteuerung.","answer":"Eine SPS verarbeitet Eingangssignale z nz. Die Lage des Schutzkontaktes und mechanische Nasen verhindern falsches Stecken. Der Schutzkontakt ist länger bzw. kontaktiert früher; der Pilotkontakt meldet den Steckzustand und schaltet Lasten erst nach sicherem Kontakt frei.","images":[]},{"id":"D27","question":"D27: Zählen Sie elektrische Leitungen auf, die für feste Verlegung geeignet sind! Anschauungsmittel: Bitte vom Prüfer verlangen! Erklären Sie die Leitungsbezeichnung \"AO5VV-U3G1,5\"! Wo darf diese Leitung verlegt werden?","answer":"Die Strombelastbarkeit hängt von Leiterquerschnitt, Werkstoff, Isolierung, Umgebungstemperatur, Häufung und Verlegeart ab. Feste Verlegung erfolgt z. B. im Rohr, im Kanal, auf/in der Wand oder auf Kabelpritschen. Schutzmaßnahmen und zulässige Einsatzbereiche sind einzuhalten.","images":[]},{"id":"D28","question":"D28: Wodurch wird bei CEE- Steckvorrichtungen erreicht, dass ein Stecker nicht in eine Steckdose mit höherer Spannung, mit anderer Stromart oder Frequenz eingesteckt werden kann? Erklären Sie die Reihenfolge der Kontaktgabe bei einer CEE- Steckvorrichtung mit Pilotkontakt! Welcher Unterschied besteht zwischen Steckstift bzw. Buchse des Schutzkontaktes zu denen des Außenleiters bzw. Neutralleiters!","answer":"CEE-Steckvorrichtungen verwenden Kennfarben und Codierung nach Spannung/Frequenz. Die Lage des Schutzkontaktes und mechanische Nasen verhindern falsches Stecken. Der Schutzkontakt ist länger bzw. kontaktiert früher; der Pilotkontakt meldet den Steckzustand und schaltet Lasten erst nach sicherem Kontakt frei.","images":[]},{"id":"D29","question":"D29: Wie ist ein 4-stelliger Farbcode bei einem Schichtwiderstand aufgebaut? Wie kann ein Widerstandswert auf einem Widerstand gekennzeichnet werden?","answer":"Beim 4-stelligen Farbcode stehen die ersten zwei Ringe für Ziffern, der dritte für den Multiplikator und der vierte für die Toleranz. Widerstände können außerdem mit Klartext, SMD-Code oder Zahlen-/Buchstabencode gekennzeichnet sein.","images":[]},{"id":"D30"," answer":"Federarten sind Druckfedern, Zugfedern, Drehfedern, Blattfedern und Tellerfedern. Federn speichern Energie, gleichen Kräfte aus, halten Teile in Position oder dämpfen Stöße. Werkstoffe sind Federstahl, Edelstahl oder Federbronze.","images":[]},{"id":"D17","question":"D17: Erklären Sie die Begriffe: Riemenantrieb Kettenantrieb Zahnradantrieb Nennen Sie zu jedem ein Beispiel und erklären Sie die Unterschiede.","answer":"Riemen-, Ketten- und Zahnradantriebe übertragen Drehbewegung und Drehmoment. Riemen laufen leise und können rutschen, Ketten übertragen formschlüssig über größere Abstände, Zahnräder übertragen präzise und schlupffrei bei kleinen Achsabständen.","images":[]},{"id":"D18","question":"D18: Welche Ausführungsmöglichkeiten von Lagern unterscheidet man? Anschauungsmittel: Schaubild Bezeichnen Sie drei verschiedene Wälzlager anhand eines Schaubildes! Wann wird bei Wälzlagern Fettschmierung bzw. Ölschmierung durchgeführt?","answer":"Lager führen und stützen bewegte Maschinenteile. Man unterscheidet Gleitlager und Wälzlager, z. B. Rillenkugellager, Zylinderrollenlager und Kegelrollenlager. Fettschmierung eignet sich bei niedrigen bis mittleren Drehzahlen; Ölschmierung bei höheren Drehzahlen, Wärmeabfuhr oder Umlaufschmierung.","images":[]},{"id":"D21","question":"D21: Welche Aufgaben haben Kupplungen? Anschauungsmittel: Schaubild Benennen Sie Anhand des Schaubildes Kupplungen und beschreiben Sie Anwendungen.","answer":"Bei spanenden Fertigungsverfahren wird Material mit einer Schneide abgetragen. Bohren erzeugt Bohrungen, Reiben verbessert Maß- und Oberflächengüte, Gewindeschneiden erzeugt Innen- oder Außengewinde, Drehen/Fräsen erzeugen rotations- bzw. prismatische Formen, Schleifen dient der Feinbearbeitung.","images":[]},{"id":"D22","question":"D22: Wozu dienen Riementriebe? Anschauungsmittel: Schaubild Nennen Sie Arten von Riemen anhand des Schaubildes und Erklären sie diese!","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, bes tigungsverfahren wird Material mit einer Schneide abgetragen. Bohren erzeugt Bohrungen, Reiben verbessert Maß- und Oberflächengüte, Gewindeschneiden erzeugt Innen- oder Außengewinde, Drehen/Fräsen erzeugen rotations- bzw. prismatische Formen, Schleifen dient der Feinbearbeitung.","images":[]},{"id":"E34","question":"E34: Welche Einrichtungen verstehen Sie unter mechanische Transportmittel? Welche Beschädigungen können zum Ausscheiden eines Stahlseiles führen? Welche Vorsichtsmaßnahmen müssen Sie beim Transport (maschinell sowie händisch) von Automatisierungsanlagen beachten?","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]},{"id":"E43","question":"E43: Welche Koordinaten-Systeme eines Roboters kennen Sie? Welche Anforderungen werden an Achsenantrieb gestellt? Nennen Sie 4. Welche Antriebskonzepte gibt es beim Roboter?","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]}],"Fertigungstechnik":[{"id":"E21","question":"E21: Was sind für Sie Vor- und Nachteile von Roboter-Systemen? Nennen Sie je 3. Nennen Sie 3 Möglichkeiten wie man eine strukturierte Programmierung erzeugt. Beschreiben sie eine davon näher.","answer":"Bei spanenden Fertigungsverfahren wird Material mit einer Schneide abgetragen. Bohren erzeugt Bohrungen, Reiben verbessert Maß- und Oberflächengüte, Gewindeschneiden erzeugt Innen- oder Außengewinde, Drehen/Fräsen erzeugen rotations- bzw. prismatische Formen, Schleifen dient der Feinbearbeitung.","images":[]}],"Werkstofftechnik":[{"id":"D4","question":"D4: Erklären Sie den Begriff und den Vorgang beim Legieren. Nennen Sie zwei Anwendungsbeispiele Nennen Sie Eigenschaften von Cu-Zn Legierungen! 1","answer":"Legieren bedeutet, einem Grundmetall gezielt weitere Elemente zuzusetzen, um Eigenschaften zu verändern. Beispiele: Messing aus Kupfer und Zink, Bronze aus Kupfer und Zinn. Cu-Zn-Legierungen sind gut bearbeitbar, korrosionsbeständig und je nach Zinkanteil gut umformbar.","images":[]},{"id":"D5","question":"D5: Was versteht man unter Korrosion? Wodurch kann bei der Auswahl des Werkstoffes Korrosion ausgeschaltet werden?","answer":"Korrosion ist die chemische oder elektrochemische Zerstörung eines Werkstoffs, meist von Metallen. Sie wird durch korrosionsbeständige Werkstoffe, Beschichtungen, galvanische Trennung, geeignete Werkstoffpaarungen und trockene/geschützte Umgebung vermindert.","images":[]},{"id":"D6","question":"D6: Erklären Sie die Begriffe und Eigenschaften von: Thermoplast Duroplast Elastomere","answer":"Thermoplaste werden beim Erwärmen weich und sind umform- bzw. schweißbar. Duroplaste sind nach dem Aushärten hart, temperaturbeständig und nicht mehr umformbar. Elastomere sind gummielastisch und kehren nach Verformung weitgehend in ihre Ausgangsform zurück.","images":[]},{"id":"D9","question":"D9: Welche Aufgabe haben Dichtungen? Benennen Sie Werkstoffe und Eigenschaften von Dichtungswerkstoffe? Nennen Sie zwei Dichtungen an ruhenden und an bewegten Flächen!","answer":"Dichtungen verhindern das Austreten oder Eindringen von Medien. Werkstoffe sind z. B. NBR, FKM, PTFE, Kupfer oder Grafit. Ruhende Dichtungen: Flachdichtung, O-Ring; bewegte Dichtungen: Radialwellendichtring, Kolbendichtung, Stangendichtung.","images":[]},{"id":"D14","question":"D14: Nennen Sie 3 unlösbare Verbindungen und beschreiben sie eine davon genauer. Warum soll eine Niete aus dem gleichen Werkstoff wie die zu verbindenden Teile bestehen?","answer":"Unlösbare Verbindungen sind Schweißen, Löten, Kleben und Nieten. Niete sollten möglichst aus gleichem oder verträglichem Werkstoff bestehen, damit Kontaktkorrosion und unterschiedliche Wärmeausdehnung vermieden werden.","images":[]},{"id":"D34","question":"D34: Nennen Sie Kontaktwerkstoffe! Welche Kontaktwerkstoffe werden verwendet, wenn hohe chemische Beständigkeit gefordert wird. Worauf ist bei Kontakten in Gleichstromkreisen zu achten?","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]},{"id":"D38","question":"D38: Welche Kräfte sind beim Kleben möglich und erklären Sie sinngemäß die physikalische Wirkungsweise einer Klebeverbindung! Nennen Sie 3 Arten von Klebern! Nennen Sie Vor- und Nachteile einer Klebeverbindung!","answer":"Beim Kleben wirken Adhäsion zwischen Klebstoff und Fügeteil sowie Kohäsion im Klebstoff. Klebstoffarten sind Sekundenkleber, Epoxidharz, PU-, Silikon- und anaerobe Klebstoffe. Vorteile: flächige Kraftübertragung und keine Bohrungen; Nachteile: Oberflächenvorbereitung, Aushärtezeit und Temperatur-/Alterungseinfluss.","images":[]}],"Montage & Instandhaltung":[{"id":"D10","question":"D10: Anschauungsmittel: Schaubild mit Schrauben u. Muttern Bezeichnen Sie vier verschiedene Schrauben und Muttern anhand eines Schaubildes! Erklären Sie das Prinzip einer Durchsteckschraube und einer Stiftschraube! Erklären Sie die Festigkeitsangabe 8.8 auf einer Sechskantschraube 1","answer":"Schrauben- und Mutternarten sind z. B. Sechskantschraube, Zylinderschraube, Senkschraube, Stiftschraube, Sechskantmutter und Sicherungsmutter. Bei einer Durchsteckschraube wird die Schraube durch beide Teile geführt und mit Mutter gesichert; bei der Stiftschraube sitzt ein Gewindeende im Bauteil. 8.8 bedeutet Rm = 800 N/mm² und Re ≈ 640 N/mm².","images":[]},{"id":"D37","question":"D37: verputzten Mauerwerk verlegt werden. Nennen Sie 3 Arten von Dübeln anhand des Schaubildes und wählen sie für das Mauerwerk den richtigen Dübel aus. Wovon hängt die mechanische Belastbarkeit der Befestigung ab? Erklären Sie den Montagevorgang für eine Dübelart. [©2023, Atzmüller Harald]","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]},{"id":"E44","question":"E44: Was verstehen Sie unter Schweißen? Um welche Verbindungsart handelt es sich beim Schweißen? Nennen Sie Vorteile – Nachteile des Schweißens? Nennen Sie Schmelzschweißverfahren!","answer":"Mögliche Lernantwort: Nennen Sie die wichtigsten Begriffe, beschreiben Sie die Funktion mit einem praktischen Beispiel und erläutern Sie mindestens zwei Vorteile, Nachteile oder Auswahlkriterien. Fachlich sollten Aufbau, Wirkprinzip, typische Anwendung und Sicherheitsaspekte angesprochen werden.","images":[]}]}</script>
<main>
<section id="selection"><h2>Kategorien auswählen</h2><p class="small">Wähle eine oder mehrere Kategorien. Die Fragen werden gemischt und nacheinander abgefragt.</p><div id="categoryList" class="category-list"></div><button id="startBtn">Quiz starten</button></section>
<section id="quiz" class="hidden"><div class="question-box"><div class="meta" id="questionTitle"></div><h2 id="questionText"></h2><button id="showAnswerBtn">Antwort anzeigen</button><div id="answerContainer" class="answer-box hidden"><strong>Lösung:</strong><div id="answerText"></div><div id="imageContainer" class="image-container"></div></div><div id="evaluationControls" class="controls hidden"><button id="correctBtn" class="success">Ich lag richtig</button><button id="wrongBtn" class="danger">Ich lag falsch</button></div></div><div class="progress-container"><div id="progressBar" class="progress-bar"></div></div><div id="statsDiv" class="stats">Beantwortet: 0 / 0 · Korrekt: 0</div></section>
<section id="result" class="hidden"><div class="result-card"><h2>Ergebnis</h2><p id="resultText"></p><button id="restartBtn">Neu starten</button></div></section>
</main>
<script>
'use strict';
const questionsData=JSON.parse(document.getElementById('questionsJson').textContent);
const $=id=>document.getElementById(id);const selection=$('selection'),categoryList=$('categoryList'),startBtn=$('startBtn'),quiz=$('quiz'),questionTitle=$('questionTitle'),questionText=$('questionText'),showAnswerBtn=$('showAnswerBtn'),answerContainer=$('answerContainer'),answerText=$('answerText'),imageContainer=$('imageContainer'),evaluationControls=$('evaluationControls'),correctBtn=$('correctBtn'),wrongBtn=$('wrongBtn'),progressBar=$('progressBar'),statsDiv=$('statsDiv'),result=$('result'),resultText=$('resultText'),restartBtn=$('restartBtn');
let allQuestions=[],remainingQuestions=[],currentQuestion=null,answeredCount=0,correctCount=0;
function renderCategories(){categoryList.innerHTML='';Object.entries(questionsData).forEach(([category,items])=>{const label=document.createElement('label');label.className='category-item';const left=document.createElement('span');const cb=document.createElement('input');cb.type='checkbox';cb.name='category';cb.value=category;left.append(cb,document.createTextNode(category));const count=document.createElement('span');count.className='pill';count.textContent=items.length+' Fragen';label.append(left,count);categoryList.appendChild(label);});}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){const selected=[...document.querySelectorAll('input[name="category"]:checked')].map(c=>c.value);if(!selected.length){alert('Bitte mindestens eine Kategorie auswählen.');return;}allQuestions=shuffle(selected.flatMap(c=>questionsData[c].map(q=>({...q,category:c}))));remainingQuestions=[...allQuestions];answeredCount=0;correctCount=0;selection.classList.add('hidden');result.classList.add('hidden');quiz.classList.remove('hidden');updateStats();updateProgressBar();loadNextQuestion();}
function loadNextQuestion(){if(!remainingQuestions.length){finishQuiz();return;}currentQuestion=remainingQuestions.pop();questionTitle.textContent=currentQuestion.category+' · '+(answeredCount+1)+' / '+allQuestions.length;questionText.textContent=currentQuestion.question;answerText.textContent='';imageContainer.innerHTML='';answerContainer.classList.add('hidden');evaluationControls.classList.add('hidden');showAnswerBtn.disabled=false;}
function showAnswer(){answerText.textContent=currentQuestion.answer||'Keine Textantwort vorhanden.';imageContainer.innerHTML='';(currentQuestion.images||[]).forEach((src,idx)=>{const fig=document.createElement('figure');const img=document.createElement('img');img.src=src;img.alt='Abbildung zur Antwort '+(idx+1);fig.appendChild(img);imageContainer.appendChild(fig);});answerContainer.classList.remove('hidden');evaluationControls.classList.remove('hidden');showAnswerBtn.disabled=true;}
function recordAnswer(ok){answeredCount++;if(ok)correctCount++;updateStats();updateProgressBar();loadNextQuestion();}
function updateProgressBar(){const pct=allQuestions.length?answeredCount/allQuestions.length*100:0;progressBar.style.width=pct+'%';}
function updateStats(){statsDiv.textContent='Beantwortet: '+answeredCount+' / '+allQuestions.length+' · Korrekt: '+correctCount;}
function finishQuiz(){quiz.classList.add('hidden');result.classList.remove('hidden');const pct=allQuestions.length?Math.round(correctCount/allQuestions.length*100):0;resultText.textContent='Du hast '+correctCount+' von '+allQuestions.length+' Fragen richtig beantwortet ('+pct+' %).';}
function restartQuiz(){result.classList.add('hidden');selection.classList.remove('hidden');}
startBtn.addEventListener('click',startQuiz);showAnswerBtn.addEventListener('click',showAnswer);correctBtn.addEventListener('click',()=>recordAnswer(true));wrongBtn.addEventListener('click',()=>recordAnswer(false));restartBtn.addEventListener('click',restartQuiz);renderCategories();
</script>
</body></html>
